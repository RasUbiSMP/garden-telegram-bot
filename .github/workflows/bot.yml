name: Seed Shop Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram
        run: |
          DATA=$(curl -s https://api.joshlei.com/v2/growagarden/info/)
          MESSAGE=$(echo "$DATA" | jq -r '.seed_shop | to_entries | map(select(.value.stock > 0)) | map("• " + (.key | gsub("_"; " ") | ascii_upcase) + " — " + (.value.price | tostring) + " Sheckles") | join("\n")')
          if [ -z "$MESSAGE" ]; then
            MESSAGE="В Seed Shop пусто или ошибка API"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.CHANNEL_ID }}" \
            -d text="🌱 SEED SHOP — GROW A GARDEN 2 🌱%0A%0A$MESSAGE%0A%0A🕐 $(date '+%H:%M:%S')%0A🔄 Следующее через 5 минут" \
            -d parse_mode="Markdown"
