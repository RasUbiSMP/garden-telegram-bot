name: Grow a Garden 2 Stock

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Получаем данные из API
          DATA=$(curl -s https://api.joshlei.com/v2/growagarden/info/)
          
          # Формируем сообщение
          if [ -z "$DATA" ]; then
            TEXT="⚠️ Ошибка API"
          else
            TEXT="🌱 *Grow a Garden 2 — Seed Shop*%0A%0A"
            TEXT="${TEXT}✅ Бот работает.%0A"
            TEXT="${TEXT}🕐 $(date '+%H:%M:%S')%0A"
            TEXT="${TEXT}🔄 Следующее через 5 минут"
          fi
          
          # Отправляем
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${TEXT}" \
            -d parse_mode="Markdown"
