name: Python Seed Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  pyjob:
    runs-on: ubuntu-latest
    steps:
      - name: Run Python script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python -c "
import requests, json, time
TOKEN='${{ secrets.BOT_TOKEN }}'
CHAT='${{ secrets.CHAT_ID }}'
url=f'https://api.telegram.org/bot{TOKEN}/sendMessage'
try:
    r=requests.get('https://api.joshlei.com/v2/growagarden/info/', timeout=10)
    data=r.json()
    seeds=data.get('seed_shop',{})
    lines=[]
    for k,v in seeds.items():
        if isinstance(v,dict) and v.get('stock',0)>0:
            name=k.replace('_',' ').title()
            price=v.get('price','?')
            lines.append(f'• {name} — {price} Sheckles')
    if lines:
        text='🌱 *Grow a Garden 2 — Seed Shop* 🌱\n\n' + '\n'.join(lines)
    else:
        text='🌱 *Seed Shop*\n\nПусто или ошибка'
    text+=f'\n\n🕐 {time.strftime(\"%H:%M:%S\")}\n🔄 Следующее через 5 минут'
    requests.post(url, json={'chat_id':CHAT,'text':text,'parse_mode':'Markdown'}, timeout=10)
except Exception as e:
    requests.post(url, json={'chat_id':CHAT,'text':f'Ошибка: {e}'})
"
